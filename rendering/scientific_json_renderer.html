<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scientific JSON Renderer</title>

<style>

body{

    margin:0;

    background:#edf2f7;

    font-family:Arial, Helvetica, sans-serif;

}

/* Slide */

.slide{

    width:1600px;

    height:900px;

    background:white;

    margin:auto;

    position:relative;

    overflow:hidden;

}

/* Title */

.title{

    position:absolute;

    left:90px;

    top:60px;

    font-size:56px;

    font-weight:700;

    color:#1747a6;

}

/* Subtitle */

.subtitle{

    position:absolute;

    left:92px;

    top:140px;

    font-size:24px;

    color:#718096;

}

/* Mechanism Chain */

.chain{

    position:absolute;

    top:320px;

    left:120px;

    display:flex;

    align-items:center;

}

/* Nodes */

.node{

    width:230px;

    height:120px;

    border-radius:28px;

    display:flex;

    align-items:center;

    justify-content:center;

    text-align:center;

    font-size:32px;

    font-weight:700;

    box-shadow:0 10px 25px rgba(0,0,0,0.08);

}

/* Semantic Colors */

.blue{

    background:#dbeafe;

    color:#1d4ed8;

}

.green{

    background:#dcfce7;

    color:#15803d;

}

.orange{

    background:#fef3c7;

    color:#d97706;

}

.purple{

    background:#ede9fe;

    color:#7c3aed;

}

/* Arrow */

.arrow{

    font-size:70px;

    margin:0 28px;

    color:#7aa2e3;

    font-weight:300;

}

/* Side Panel */

.side-panel{

    position:absolute;

    right:90px;

    top:220px;

    width:330px;

    padding:35px;

    border-radius:30px;

    background:#eff6ff;

    border-left:8px solid #3b82f6;

    box-shadow:0 10px 25px rgba(0,0,0,0.08);

}

.side-title{

    font-size:40px;

    font-weight:700;

    color:#1747a6;

    margin-bottom:20px;

}

.side-text{

    font-size:25px;

    line-height:1.8;

    color:#334155;

}

/* Description */

.description{

    position:absolute;

    left:120px;

    bottom:120px;

    width:1250px;

    font-size:30px;

    line-height:1.8;

    color:#334155;

}

/* Footer */

.footer{

    position:absolute;

    right:60px;

    bottom:35px;

    font-size:18px;

    color:#94a3b8;

}

</style>

</head>

<body>

<div id="app"></div>

<script>

/* =========================
   JSON SCHEMA
========================= */

const schema = {

  "slide_type": "scientific_mechanism",

  "title": "Rhizosphere Nitrogen Cycling Mechanism",

  "subtitle": "AI-native Scientific Semantic Rendering Demonstration",

  "layout": "horizontal_mechanism_chain",

  "semantic_theme": {

    "microenvironment": "blue",

    "microbiome": "green",

    "nitrogen": "orange",

    "yield": "purple"

  },

  "components": [

    {
      "type": "node",

      "label": "Microenvironment",

      "semantic_role": "microenvironment"
    },

    {
      "type": "arrow",

      "direction": "right"
    },

    {
      "type": "node",

      "label": "Microbiome",

      "semantic_role": "microbiome"
    },

    {
      "type": "arrow",

      "direction": "right"
    },

    {
      "type": "node",

      "label": "Nitrogen Cycling",

      "semantic_role": "nitrogen"
    },

    {
      "type": "arrow",

      "direction": "right"
    },

    {
      "type": "node",

      "label": "Crop Yield",

      "semantic_role": "yield"
    }

  ],

  "side_panel": {

    "title": "GIS Integration",

    "content":
      "Spatial monitoring enables large-scale analysis of rhizosphere activity, nitrogen transport, and crop productivity patterns across agricultural systems."

  },

  "description":
    "Microenvironment reconstruction regulates rhizosphere microbial communities, enhances nitrogen transformation efficiency, and ultimately improves crop yield formation."

};

/* =========================
   SEMANTIC COLOR MAPPING
========================= */

const semanticMap = {

    microenvironment:"blue",

    microbiome:"green",

    nitrogen:"orange",

    yield:"purple"

};

/* =========================
   RENDER ENGINE
========================= */

function renderScientificSlide(data){

    const slide = document.createElement("div");

    slide.className = "slide";

    /* Title */

    const title = document.createElement("div");

    title.className = "title";

    title.innerText = data.title;

    slide.appendChild(title);

    /* Subtitle */

    const subtitle = document.createElement("div");

    subtitle.className = "subtitle";

    subtitle.innerText = data.subtitle;

    slide.appendChild(subtitle);

    /* Chain */

    const chain = document.createElement("div");

    chain.className = "chain";

    data.components.forEach(component => {

        if(component.type === "node"){

            const node = document.createElement("div");

            const semanticColor =
                semanticMap[component.semantic_role];

            node.className =
                `node ${semanticColor}`;

            node.innerText =
                component.label;

            chain.appendChild(node);

        }

        if(component.type === "arrow"){

            const arrow =
                document.createElement("div");

            arrow.className = "arrow";

            arrow.innerText = "→";

            chain.appendChild(arrow);

        }

    });

    slide.appendChild(chain);

    /* Side Panel */

    const panel = document.createElement("div");

    panel.className = "side-panel";

    panel.innerHTML = `

        <div class="side-title">
            ${data.side_panel.title}
        </div>

        <div class="side-text">
            ${data.side_panel.content}
        </div>

    `;

    slide.appendChild(panel);

    /* Description */

    const description =
        document.createElement("div");

    description.className = "description";

    description.innerText =
        data.description;

    slide.appendChild(description);

    /* Footer */

    const footer =
        document.createElement("div");

    footer.className = "footer";

    footer.innerText =
        "Dynamic AI-native Scientific Rendering Engine";

    slide.appendChild(footer);

    return slide;
}

/* =========================
   EXECUTE RENDERING
========================= */

const renderedSlide =
    renderScientificSlide(schema);

document
    .getElementById("app")
    .appendChild(renderedSlide);

</script>

</body>

</html>
